<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>itk-wasm Simple Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.6;
        }
        .container {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            background: #fafafa;
        }
        pre {
            background: #282c34;
            color: #abb2bf;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            text-align: left;
        }
        .status {
            font-weight: bold;
            color: #0066cc;
        }
    </style>
</head>
<body>

    <h2>itk-wasm Microscope Image Reader</h2>
    <p>Upload a <strong>.tif</strong>, <strong>.tiff</strong>, or <strong>.jpg</strong> image to extract its scientific metadata directly in your browser.</p>

    <div class="container">
        <input type="file" id="fileInput" accept=".tif,.tiff,.jpg,.jpeg" disabled />
        <p id="statusText" class="status">Loading itk-wasm libraries from CDN...</p>
    </div>

    <h3>Image Metadata Output:</h3>
    <pre id="output">No image loaded yet.</pre>

    <script type="module">
        // Importing the specific 'index-worker-embedded.min.js' build handles all Web Worker configuration automatically
        import { readImage } from "https://cdn.jsdelivr.net/npm/@itk-wasm/image-io@1.6.0/dist/bundle/index-worker-embedded.min.js";

        const fileInput = document.getElementById('fileInput');
        const statusText = document.getElementById('statusText');
        const output = document.getElementById('output');

        // Library loaded successfully
        statusText.innerText = "Ready! Choose a TIF or JPEG image.";
        fileInput.disabled = false;

        fileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            statusText.innerText = `Processing "${file.name}"...`;
            output.innerText = "Analyzing file arrays...";

            try {
                // Pass the native browser File object directly to the updated API
                const { image } = await readImage(file);

                // Output the results
                statusText.innerText = "Image read successfully!";
                
                output.innerText = JSON.stringify({
                    imageType: image.imageType,
                    size: image.size,          
                    origin: image.origin,      
                    spacing: image.spacing,    
                    dataLength: image.data.length
                }, null, 2);

                console.log("Full Image Object:", image);

            } catch (error) {
                statusText.innerText = "Error reading file.";
                output.innerText = error.message;
                console.error(error);
            }
        });
    </script>
</body>
</html>
