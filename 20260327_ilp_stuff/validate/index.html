<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilastik Validation Console</title>
    <style>
        /* Zeiss Zen / Professional Scientific Dark Theme */
        :root {
            --bg-base: #111111;
            --bg-panel: #252526;
            --bg-input: #1e1e1e;
            --border-color: #3e3e42;
            --text-main: #cccccc;
            --text-muted: #888888;
            --accent-blue: #007acc;
            --accent-hover: #0098ff;
            --status-valid: #4caf50;
            --status-invalid: #f44336;
            --status-warn: #ff9800;
        }

        body {
            font-family: "Segoe UI", Roboto, Helvetica, sans-serif;
            font-size: 13px;
            background-color: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: #ffffff; }
        
        #status-badge {
            padding: 4px 12px;
            border-radius: 2px;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
        }

        /* Layout Grid */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-base);
        }

        /* Panels */
        .panel { border-bottom: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .panel-header {
            background-color: #2d2d30;
            padding: 6px 12px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }
        .panel-body { padding: 12px; }

        /* Dropzone */
        #dropzone {
            border: 1px dashed var(--border-color);
            background-color: var(--bg-input);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        #dropzone:hover, #dropzone.dragover { border-color: var(--accent-blue); color: #ffffff; }

        /* Logs */
        #log-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 12px;
            line-height: 1.5;
            background: var(--bg-input);
        }
        .log-line { margin-bottom: 2px; display: flex; }
        .log-success { color: var(--status-valid); }
        .log-error { color: var(--status-invalid); }
        .log-warn { color: var(--status-warn); }
        .log-info { color: var(--accent-blue); }
        .log-text { color: var(--text-main); }

        /* Labels & Thumbnails */
        .label-list { list-style: none; padding: 0; margin: 0; }
        .label-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .color-box { width: 14px; height: 14px; border: 1px solid rgba(255,255,255,0.2); }
        
        .thumb-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .thumb-card { background: var(--bg-input); border: 1px solid var(--border-color); padding: 4px; text-align: center; }
        .thumb-title { font-size: 10px; margin-bottom: 4px; color: var(--text-muted); text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        canvas { background: #000; max-width: 100%; image-rendering: pixelated; border: 1px solid #000; }
        
        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

    <header>
        <h1>Ilastik Validation Console</h1>
        <div id="status-badge">Waiting for file</div>
    </header>

    <div class="workspace">
        <div class="sidebar">
            <div class="panel">
                <div class="panel-header">Data Source</div>
                <div class="panel-body">
                    <div id="dropzone">Click or Drop .ilp Project</div>
                    <input type="file" id="fileInput" accept=".ilp" style="display: none;">
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">Classes / Labels</div>
                <div class="panel-body">
                    <ul id="labels-list" class="label-list"></ul>
                </div>
            </div>

            <div class="panel" style="flex: 1; border-bottom: none;">
                <div class="panel-header">Label Blocks (Thumbnails)</div>
                <div class="panel-body">
                    <div id="thumbnails" class="thumb-grid"></div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel-header">System Logs</div>
            <div id="log-container"></div>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const logContainer = document.getElementById('log-container');
        const statusBadge = document.getElementById('status-badge');
        const labelsList = document.getElementById('labels-list');
        const thumbnailsDiv = document.getElementById('thumbnails');

        // Palette fallback in case HDF5 colors are difficult to parse
        const FALLBACK_PALETTE = [
            [255, 0, 0], [0, 255, 0], [255, 255, 0], [0, 0, 255], 
            [255, 0, 255], [0, 255, 255], [255, 128, 0], [128, 0, 255]
        ];
        let currentColors = [];

        const worker = new Worker('worker.js');

        worker.onerror = function(error) {
            logMsg('error', `FATAL THREAD ERROR: ${error.message}`);
            setStatus(false);
        };

        worker.onmessage = function(e) {
            const data = e.data;
            
            if (data.type === 'log') logMsg(data.level, data.msg);
            
            if (data.type === 'status') setStatus(data.isValid);
            
            if (data.type === 'labels') {
                currentColors = FALLBACK_PALETTE; // Simplified for robustness
                labelsList.innerHTML = '';
                data.names.forEach((name, i) => {
                    const color = currentColors[i % currentColors.length];
                    const li = document.createElement('li');
                    li.className = 'label-item';
                    li.innerHTML = `
                        <div class="color-box" style="background-color: rgb(${color[0]},${color[1]},${color[2]})"></div>
                        <span>${name}</span>
                    `;
                    labelsList.appendChild(li);
                });
            }

            if (data.type === 'thumbnail') {
                renderThumbnail(data.name, data.labelData, data.rawData, data.shape, data.order);
            }

            if (data.type === 'done') {
                dropzone.textContent = "Click or Drop .ilp Project";
            }
        };

        // UI Listeners
        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault(); dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) processFile(e.target.files[0]);
        });

        function processFile(file) {
            logContainer.innerHTML = '';
            labelsList.innerHTML = '';
            thumbnailsDiv.innerHTML = '';
            statusBadge.textContent = 'PROCESSING...';
            statusBadge.style.color = '#fff';
            statusBadge.style.borderColor = 'var(--border-color)';
            dropzone.textContent = "Processing...";
            
            worker.postMessage({ file: file });
        }

        function logMsg(level, msg) {
            const el = document.createElement('div');
            el.className = 'log-line';
            
            let prefix = '[*]';
            let prefixClass = 'log-info';
            
            if (level === 'success') { prefix = '[+]'; prefixClass = 'log-success'; }
            if (level === 'error') { prefix = '[-]'; prefixClass = 'log-error'; }
            if (level === 'warn') { prefix = '[!]'; prefixClass = 'log-warn'; }

            el.innerHTML = `<span class="${prefixClass}" style="width: 30px;">${prefix}</span><span class="log-text">${msg.replace(/ /g, '&nbsp;')}</span>`;
            logContainer.appendChild(el);
            logContainer.scrollTop = logContainer.scrollHeight; // Auto-scroll
        }

        function setStatus(isValid) {
            statusBadge.textContent = isValid ? "VALID" : "INVALID";
            statusBadge.style.color = isValid ? "var(--status-valid)" : "var(--status-invalid)";
            statusBadge.style.borderColor = isValid ? "var(--status-valid)" : "var(--status-invalid)";
        }

        function renderThumbnail(titleText, labelData, rawData, shape, order) {
            const axes = order.map(a => a.toLowerCase());
            const xIdx = axes.indexOf('x');
            const yIdx = axes.indexOf('y');

            if (xIdx === -1 || yIdx === -1) {
                console.error(`Could not find X or Y axes in order: ${order} for ${titleText}`);
                return;
            }

            const width = shape[xIdx];
            const height = shape[yIdx];
            
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(width, height);

            // Calculate strides for arbitrary indexing
            const strides = new Array(shape.length).fill(1);
            for (let i = shape.length - 2; i >= 0; i--) {
                strides[i] = strides[i + 1] * shape[i + 1];
            }

            // Normalize raw data if present
            let rawMax = 1;
            if (rawData) {
                for (let i = 0; i < rawData.length; i++) if (rawData[i] > rawMax) rawMax = rawData[i];
            }

            // Map each pixel (y, x) to the flat array index
            // We fix all other dimensions (Z, C, etc.) to 0
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const arrayIdx = (y * strides[yIdx]) + (x * strides[xIdx]);
                    const pixelIdx = (y * width + x) * 4;

                    let r = 0, g = 0, b = 0, a = 255;

                    if (rawData) {
                        const val = (rawData[arrayIdx] / rawMax) * 255;
                        r = g = b = val;
                    }

                    const labelId = labelData[arrayIdx]; 
                    if (labelId > 0) {
                        const color = currentColors[(labelId - 1) % currentColors.length];
                        const alpha = rawData ? 0.6 : 1.0;
                        
                        r = r * (1 - alpha) + color[0] * alpha;
                        g = g * (1 - alpha) + color[1] * alpha;
                        b = b * (1 - alpha) + color[2] * alpha;
                    } else if (!rawData) {
                        a = 0; // Transparent BG if no raw data
                    }

                    imgData.data[pixelIdx] = r;
                    imgData.data[pixelIdx + 1] = g;
                    imgData.data[pixelIdx + 2] = b;
                    imgData.data[pixelIdx + 3] = a;
                }
            }
            ctx.putImageData(imgData, 0, 0);

            const card = document.createElement('div');
            card.className = 'thumb-card';
            card.innerHTML = `<div class="thumb-title" title="${titleText}">${titleText}</div>`;
            card.appendChild(canvas);
            thumbnailsDiv.appendChild(card);
        }
    </script>
</body>
</html>
