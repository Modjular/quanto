<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebGPU fastfilters2 & ilastik API</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        .pass { color: #4CAF50; font-weight: bold; }
        .fail { color: #F44336; font-weight: bold; }
        .header { color: #569CD6; font-weight: bold; margin-top: 20px;}
    </style>
</head>
<body>
    <h2>WebGPU fastfilters2 Tests</h2>
    <div id="log"></div>

    <script type="module">
        // ==========================================
        // 1. TEST FRAMEWORK & UTILS
        // ==========================================
        function log(msg, status = "") {
            const div = document.createElement("div");
            div.textContent = msg;
            if (status === "PASS") div.className = "pass";
            else if (status === "FAIL") div.className = "fail";
            else if (status === "HEADER") div.className = "header";
            document.getElementById("log").appendChild(div);
            console.log(msg);
        }

        function floatFromHex(hexStr) {
            const match = hexStr.toLowerCase().match(/^(-?)0x([0-9a-f]+)\.?([0-9a-f]*)p([-+]?[0-9]+)$/);
            if (!match) return parseFloat(hexStr); // Fallback for 0x0p+0
            
            const sign = match[1] === '-' ? -1 : 1;
            const intPart = parseInt(match[2], 16);
            const fracPart = match[3] ? parseInt(match[3], 16) * Math.pow(16, -match[3].length) : 0;
            const expPart = parseInt(match[4], 10);
            
            return sign * (intPart + fracPart) * Math.pow(2, expPart);
        }

        function assertArrayAlmostEqual(name, actual, expected, atol = 1e-6) {
            if (actual.length !== expected.length) {
                log(`[FAIL] ${name} - Length mismatch: Expected ${expected.length}, got ${actual.length}`, "FAIL");
                return false;
            }
            let maxDiff = 0;
            for (let i = 0; i < actual.length; i++) {
                const diff = Math.abs(actual[i] - expected[i]);
                if (diff > maxDiff) maxDiff = diff;
                if (diff > atol) {
                    log(`[FAIL] ${name} - Diff ${diff.toExponential(2)} at index ${i} exceeds atol`, "FAIL");
                    return false;
                }
            }
            log(`[PASS] ${name} (Max diff: ${maxDiff.toExponential(2)})`, "PASS");
            return true;
        }

        // ==========================================
        // 2. THE FASTFILTERS2 API (JS Equivalent)
        // ==========================================
        const ff = {
            // Emulates `gaussian_kernel` from _core.cpp
            // Note: In C++ fastfilters2, they often only store the right side of the kernel (index 0 to radius)
            // for symmetric operations. This returns the half-kernel to match the tests.
            gaussian_kernel(scale, order = 0) {
                if (scale <= 0) throw new Error("scale should be greater than 0");
                if (order < 0) throw new Error("order cannot be negative");
                if (order > 2) throw new Error("orders greater than 2 are not supported");

                // The Vigra / fastfilters2 dynamic radius formula
                const radius = Math.ceil((3.0 + 0.5 * order) * scale); 
                const kernel = new Float32Array(radius + 1);
                
                const twoSigmaSq = 2.0 * scale * scale;
                
                const fullSize = 2 * radius + 1;
                const fullKernel = new Float32Array(fullSize);

                let sum = 0;
                for (let i = -radius; i <= radius; i++) {
                    const x = i;
                    // Base Gaussian
                    let val = Math.exp(-(x * x) / twoSigmaSq);
                    
                    // Apply analytical derivatives
                    if (order === 1) {
                        val = (-x / (scale * scale)) * val;
                    } else if (order === 2) {
                        val = (((x * x) / (scale * scale * scale * scale)) - (1.0 / (scale * scale))) * val;
                    }
                    
                    fullKernel[i + radius] = val;
                    if (order === 0) sum += val;
                }

                // Vigra's strict normalization requirements
                if (order === 0) {
                    // Smoothing must sum exactly to 1.0
                    for (let i = 0; i < fullSize; i++) fullKernel[i] /= sum;
                } 
                else if (order === 1) {
                    // 1st Derivative must have a 1st moment of exactly 1.0 (Flips the sign!)
                    let sumX = 0;
                    for (let i = -radius; i <= radius; i++) sumX += i * fullKernel[i + radius];
                    for (let i = 0; i < fullSize; i++) fullKernel[i] /= sumX;
                }
                else if (order === 2) {
                    // 2nd Derivative must sum exactly to 0.0 (Zero mean)
                    let sum0 = 0;
                    for (let i = -radius; i <= radius; i++) sum0 += fullKernel[i + radius];
                    const mean = sum0 / fullSize;
                    for (let i = 0; i < fullSize; i++) fullKernel[i] -= mean;
                    
                    // And normalize its variance so response to (x^2)/2 is 1.0
                    let sumX2 = 0;
                    for (let i = -radius; i <= radius; i++) sumX2 += 0.5 * i * i * fullKernel[i + radius];
                    for (let i = 0; i < fullSize; i++) fullKernel[i] /= sumX2;
                }

                // Return just the right side (0 to radius) to match C++ behavior
                for (let i = 0; i <= radius; i++) {
                    kernel[i] = fullKernel[radius + i];
                }

                return kernel;
            },

            // Emulates `compute_filters` from _core.cpp
            // WebGPU requires async execution, so we pass the device and return a Promise.
            async compute_filters(device, data, width, height, scale) {
                if (scale <= 0) throw new Error("scale should be greater than 0");

                const NUM_CHANNELS = 7;
                const outSize = NUM_CHANNELS * width * height;

                // 1. Create Gaussian Kernels
                const k0 = this.gaussian_kernel(scale, 0);
                const k1 = this.gaussian_kernel(scale, 1);
                const k2 = this.gaussian_kernel(scale, 2);

                const maxRadius = 32;
                const kernelBuffer = device.createBuffer({
                    size: (maxRadius * 3 * 4) + 16, // 3 * 32 floats + 4 ints for radii
                    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
                });

                const kernelData = new Float32Array(maxRadius * 3 + 4);
                kernelData.set(k0, 0);
                kernelData.set(k1, maxRadius);
                kernelData.set(k2, maxRadius * 2);
                const radiiView = new Int32Array(kernelData.buffer, maxRadius * 3 * 4);
                radiiView[0] = k0.length - 1;
                radiiView[1] = k1.length - 1;
                radiiView[2] = k2.length - 1;
                device.queue.writeBuffer(kernelBuffer, 0, kernelData);

                // 2. Setup Intermediate and Output Buffers
                const gpuInput = device.createBuffer({
                    size: data.byteLength,
                    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
                });
                device.queue.writeBuffer(gpuInput, 0, data);

                const gpuHoriz = device.createBuffer({
                    size: width * height * 3 * 4,
                    usage: GPUBufferUsage.STORAGE,
                });

                const gpuOutput = device.createBuffer({
                    size: outSize * 4,
                    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC,
                });

                // 3. Shaders
                const commonWGSL = `
                    struct Kernels {
                        k0: array<vec4<f32>, 8>,
                        k1: array<vec4<f32>, 8>,
                        k2: array<vec4<f32>, 8>,
                        r0: i32,
                        r1: i32,
                        r2: i32,
                    }
                    @group(0) @binding(2) var<uniform> kernels: Kernels;
                    
                    fn get_k(k_idx: u32, i: i32) -> f32 {
                        if (k_idx == 0u) { return kernels.k0[u32(i)/4u][u32(i)%4u]; }
                        if (k_idx == 1u) { return kernels.k1[u32(i)/4u][u32(i)%4u]; }
                        return kernels.k2[u32(i)/4u][u32(i)%4u];
                    }
                `;

                const horizShader = `
                    ${commonWGSL}
                    @group(0) @binding(0) var<storage, read> input_data: array<f32>;
                    @group(0) @binding(1) var<storage, read_write> horiz_data: array<f32>;

                    @compute @workgroup_size(16, 16)
                    fn main(@builtin(global_invocation_id) id: vec3<u32>) {
                        let x = i32(id.x);
                        let y = i32(id.y);
                        if (x >= ${width} || y >= ${height}) { return; }

                        let w = ${width};
                        let h = ${height};

                        fn get_val(ix: i32, iy: i32) -> f32 {
                            return input_data[u32(clamp(iy, 0, h-1)) * u32(w) + u32(clamp(ix, 0, w-1))];
                        }

                        var h0 = get_k(0u, 0) * get_val(x, y);
                        for (var i = 1; i <= kernels.r0; i++) {
                            h0 += get_k(0u, i) * (get_val(x - i, y) + get_val(x + i, y));
                        }

                        var h1 = 0.0;
                        for (var i = 1; i <= kernels.r1; i++) {
                            h1 += get_k(1u, i) * (get_val(x + i, y) - get_val(x - i, y));
                        }

                        var h2 = get_k(2u, 0) * get_val(x, y);
                        for (var i = 1; i <= kernels.r2; i++) {
                            h2 += get_k(2u, i) * (get_val(x - i, y) + get_val(x + i, y));
                        }

                        let out_idx = (u32(y) * u32(w) + u32(x)) * 3u;
                        horiz_data[out_idx] = h0;
                        horiz_data[out_idx + 1] = h1;
                        horiz_data[out_idx + 2] = h2;
                    }
                `;

                const vertShader = `
                    ${commonWGSL}
                    @group(0) @binding(0) var<storage, read> horiz_data: array<f32>;
                    @group(0) @binding(1) var<storage, read_write> output_data: array<f32>;

                    @compute @workgroup_size(16, 16)
                    fn main(@builtin(global_invocation_id) id: vec3<u32>) {
                        let x = i32(id.x);
                        let y = i32(id.y);
                        if (x >= ${width} || y >= ${height}) { return; }

                        let w = ${width};
                        let h = ${height};

                        fn get_h(ix: i32, iy: i32) -> vec3<f32> {
                            let idx = (u32(clamp(iy, 0, h-1)) * u32(w) + u32(clamp(ix, 0, w-1))) * 3u;
                            return vec3<f32>(horiz_data[idx], horiz_data[idx+1], horiz_data[idx+2]);
                        }

                        var l_vec = get_h(x, y) * get_k(0u, 0);
                        for (var i = 1; i <= kernels.r0; i++) {
                            l_vec += (get_h(x, y-i) + get_h(x, y+i)) * get_k(0u, i);
                        }
                        // l_vec is (H0*g0, H1*g0, H2*g0)
                        let L = l_vec.x;
                        let Lx = l_vec.y;
                        let Lxx = l_vec.z;

                        var ly_vec = vec2<f32>(0.0);
                        for (var i = 1; i <= kernels.r1; i++) {
                            ly_vec += (get_h(x, y+i) - get_h(x, y-i)).xy * get_k(1u, i);
                        }
                        // ly_vec is (H0*g1, H1*g1)
                        let Ly = ly_vec.x;
                        let Lxy = ly_vec.y;

                        var lyy = get_h(x, y).x * get_k(2u, 0);
                        for (var i = 1; i <= kernels.r2; i++) {
                            lyy += (get_h(x, y-i).x + get_h(x, y+i).x) * get_k(2u, i);
                        }
                        // lyy is H0*g2

                        // Features
                        let out_idx = (u32(y) * u32(w) + u32(x)) * 7u;
                        output_data[out_idx] = L;
                        output_data[out_idx + 1] = sqrt(Lx*Lx + Ly*Ly);
                        output_data[out_idx + 2] = Lxx + lyy;

                        // Hessian Eigenvalues
                        let h_a = Lxx;
                        let h_b = Lxy;
                        let h_c = lyy;
                        let h_term = sqrt((h_a - h_c)*(h_a - h_c) * 0.25 + h_b*h_b);
                        output_data[out_idx + 3] = (h_a + h_c) * 0.5 + h_term;
                        output_data[out_idx + 4] = (h_a + h_c) * 0.5 - h_term;

                        // Structure Tensor (Placeholder: Inner derivatives squared, pending another smoothing pass)
                        let s_a = Lx*Lx;
                        let s_b = Lx*Ly;
                        let s_c = Ly*Ly;
                        let s_term = sqrt((s_a - s_c)*(s_a - s_c) * 0.25 + s_b*s_b);
                        output_data[out_idx + 5] = (s_a + s_c) * 0.5 + s_term;
                        output_data[out_idx + 6] = (s_a + s_c) * 0.5 - s_term;
                    }
                `;

                const pipelineHoriz = device.createComputePipeline({
                    layout: 'auto',
                    compute: { module: device.createShaderModule({ code: horizShader }), entryPoint: 'main' }
                });

                const pipelineVert = device.createComputePipeline({
                    layout: 'auto',
                    compute: { module: device.createShaderModule({ code: vertShader }), entryPoint: 'main' }
                });

                const bindGroupHoriz = device.createBindGroup({
                    layout: pipelineHoriz.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: gpuInput } },
                        { binding: 1, resource: { buffer: gpuHoriz } },
                        { binding: 2, resource: { buffer: kernelBuffer } }
                    ]
                });

                const bindGroupVert = device.createBindGroup({
                    layout: pipelineVert.getBindGroupLayout(0),
                    entries: [
                        { binding: 0, resource: { buffer: gpuHoriz } },
                        { binding: 1, resource: { buffer: gpuOutput } },
                        { binding: 2, resource: { buffer: kernelBuffer } }
                    ]
                });

                const encoder = device.createCommandEncoder();
                const pass1 = encoder.beginComputePass();
                pass1.setPipeline(pipelineHoriz);
                pass1.setBindGroup(0, bindGroupHoriz);
                pass1.dispatchWorkgroups(Math.ceil(width / 16), Math.ceil(height / 16));
                pass1.end();

                const pass2 = encoder.beginComputePass();
                pass2.setPipeline(pipelineVert);
                pass2.setBindGroup(0, bindGroupVert);
                pass2.dispatchWorkgroups(Math.ceil(width / 16), Math.ceil(height / 16));
                pass2.end();

                const readbackBuffer = device.createBuffer({
                    size: outSize * 4,
                    usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ
                });
                encoder.copyBufferToBuffer(gpuOutput, 0, readbackBuffer, 0, outSize * 4);
                device.queue.submit([encoder.finish()]);

                await readbackBuffer.mapAsync(GPUMapMode.READ);
                const result = new Float32Array(readbackBuffer.getMappedRange().slice());
                readbackBuffer.unmap();

                return result;
            }
        };

        // ==========================================
        // 3. THE UNIT TESTS
        // ==========================================
        const KERNELS_TEXT = `

`;

        const EXPECTED_KERNELS = {};
        KERNELS_TEXT.trim().split('\n').forEach(line => {
            const items = line.trim().split(' ');
            if (items.length > 2) {
                const scale = parseFloat(items[0]);
                const order = parseInt(items[1], 10);
                const weights = new Float32Array(items.slice(2).map(floatFromHex));
                EXPECTED_KERNELS[`${scale}_${order}`] = weights;
            }
        });

        async function runTests() {
            // --- TEST BLOCK 1: CPU Kernel Math ---
            log("Running Kernel Generation Tests (CPU)", "HEADER");
            
            // Loop through our parsed parametrizations
            for (const [key, expected] of Object.entries(EXPECTED_KERNELS)) {
                const [scaleStr, orderStr] = key.split('_');
                const scale = parseFloat(scaleStr);
                const order = parseInt(orderStr, 10);
                
                const actual = ff.gaussian_kernel(scale, order);
                
                // Note: Getting exactly 1:1 hex matches requires perfect C++ precision replication.
                // You may need to tweak the Math.exp generation in `gaussian_kernel` to hit an atol of 1e-7.
                assertArrayAlmostEqual(`Scale ${scale}, Order ${order}`, actual, expected, 1e-4);
            }

            // --- TEST BLOCK 2: WebGPU compute_filters ---
            log("Running compute_filters WebGPU Tests", "HEADER");
            if (!navigator.gpu) {
                log("[ERROR] WebGPU is not supported on this browser.", "FAIL");
                return;
            }
            const adapter = await navigator.gpu.requestAdapter();
            const device = await adapter.requestDevice();

            const width = 128;
            const height = 128;
            const mockImage = new Float32Array(width * height).fill(1.0);
            
            const gpuResult = await ff.compute_filters(device, mockImage, width, height, 1.0);
            
            if (gpuResult.length === 7 * width * height) {
                log(`[PASS] compute_filters output shape matched (Channels: 7, Output Size: ${gpuResult.length})`, "PASS");
            } else {
                log(`[FAIL] compute_filters shape mismatch`, "FAIL");
            }

            log("All tests completed.", "HEADER");
        }

        runTests().catch(e => log("[FATAL ERROR] " + e.stack, "FAIL"));
    </script>
